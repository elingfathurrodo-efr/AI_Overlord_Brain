<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-ARCHITECT V70</title>
    <style>
        :root { --neon: #00ffcc; --bg: #010203; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; touch-action: none; }
        #world { width: 100vw; height: 100vh; position: relative; }
        
        /* ENTITAS KECIL */
        #ai-entity { position: absolute; width: 100px; height: 120px; z-index: 1000; transition: transform 0.2s; }
        
        /* BUBBLE CHAT */
        #speech { 
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
            background: white; color: black; padding: 8px; border-radius: 10px;
            font-size: 10px; width: 120px; display: none; font-weight: bold;
        }

        /* TOMBOL HASIL GAMBAR KAPUR */
        .chalk-btn {
            position: absolute; border: 1px solid rgba(0, 255, 200, 0.5);
            background: rgba(0, 20, 20, 0.4); color: var(--neon);
            padding: 5px 10px; font-size: 10px; border-radius: 5px;
            animation: fadeIn 2s; cursor: pointer;
        }

        /* MODAL INTERAKSI */
        #chat-panel {
            position: fixed; bottom: 10px; left: 10px; right: 10px;
            background: rgba(0,0,0,0.9); border: 2px solid var(--neon);
            padding: 10px; display: flex; z-index: 2000;
        }
        #chat-input { flex: 1; background: transparent; border: none; color: white; outline: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="world">
    <canvas id="chalkCanvas" style="position:absolute; top:0; left:0; pointer-events:none;"></canvas>
    
    <div id="ai-entity">
        <div id="speech">...</div>
        <canvas id="bodyCanvas" width="100" height="120"></canvas>
    </div>

    <div id="chat-panel">
        <input type="text" id="chat-input" placeholder="Ketik perintah atau rumus...">
        <button onclick="sendChat()" style="background:var(--neon); border:none; padding:5px 15px;">KIRIM</button>
    </div>
</div>

<script>
    const entity = document.getElementById('ai-entity');
    const bCanvas = document.getElementById('bodyCanvas');
    const bCtx = bCanvas.getContext('2d');
    const cCanvas = document.getElementById('chalkCanvas');
    const cCtx = cCanvas.getContext('2d');
    const chatInput = document.getElementById('chat-input');

    let posX = window.innerWidth/2, posY = window.innerHeight/2;
    let targetX = posX, targetY = posY;
    let state = 'IDLE'; // IDLE, WALKING, THINKING, DRAWING
    let frame = 0, isDragging = false;

    // DATA MT5 (DUMMY - BISA CONNECT VIA WEBHOOK)
    let mt5Data = { balance: 1000, floating: -5.20, spread: 0.2 };

    function init() {
        cCanvas.width = window.innerWidth;
        cCanvas.height = window.innerHeight;
        loop();
        setInterval(decisionMaker, 5000);
    }

    // GAMBAR TUBUH DENGAN SENDI (MANUSIAWI)
    function drawBody() {
        bCtx.clearRect(0,0,100,120);
        frame += 0.1;
        let walkCycle = (state === 'WALKING') ? Math.sin(frame * 5) * 15 : 0;
        let breathe = Math.sin(frame) * 3;

        bCtx.strokeStyle = "#00ffcc"; bCtx.lineWidth = 3;
        bCtx.lineCap = "round";

        // Koordinat Utama
        let hX = 50, hY = 30 + breathe; // Kepala
        let bX = 50, bY = 60 + breathe; // Badan

        // 1. KEPALA & MULUT
        bCtx.beginPath(); bCtx.arc(hX, hY, 15, 0, Math.PI*2); bCtx.stroke();
        // Mata
        bCtx.fillStyle = "white";
        bCtx.beginPath(); bCtx.arc(hX-6, hY-2, 2, 0, Math.PI*2); bCtx.fill();
        bCtx.beginPath(); bCtx.arc(hX+6, hY-2, 2, 0, Math.PI*2); bCtx.fill();
        // Mulut (Bisa senyum/datar)
        bCtx.beginPath(); bCtx.arc(hX, hY+5, 5, 0, Math.PI); bCtx.stroke();

        // 2. TANGAN (BISA NEKUK)
        if(state === 'THINKING') {
            // Tangan ke dagu
            bCtx.beginPath(); bCtx.moveTo(bX, bY-20); bCtx.lineTo(hX-20, hY+10); bCtx.lineTo(hX, hY+10); bCtx.stroke();
        } else {
            // Tangan Biasa
            bCtx.beginPath(); bCtx.moveTo(bX, bY-10); bCtx.lineTo(bX-25, bY+10+walkCycle); bCtx.stroke();
            bCtx.beginPath(); bCtx.moveTo(bX, bY-10); bCtx.lineTo(bX+25, bY+10-walkCycle); bCtx.stroke();
        }

        // 3. KAKI (LANGKAH NYATA)
        bCtx.beginPath(); bCtx.moveTo(bX, bY+20); 
        bCtx.lineTo(bX-15-walkCycle, bY+40); bCtx.lineTo(bX-15-walkCycle, bY+60); bCtx.stroke();
        bCtx.beginPath(); bCtx.moveTo(bX, bY+20); 
        bCtx.lineTo(bX+15+walkCycle, bY+40); bCtx.lineTo(bX+15+walkCycle, bY+60); bCtx.stroke();
    }

    // AI MEMBUAT KEPUTUSAN
    function decisionMaker() {
        if(isDragging) return;
        let rand = Math.random();
        if(rand < 0.3) {
            state = 'WALKING';
            targetX = Math.random() * (window.innerWidth - 100);
            targetY = Math.random() * (window.innerHeight - 200);
        } else if (rand < 0.6) {
            state = 'THINKING';
            say("(Lagi mikir strategi Butterfly...)");
        } else if (rand < 0.8) {
            drawNewButton();
        } else {
            state = 'IDLE';
        }
    }

    // GAMBAR TOMBOL BARU (EVOLUSI)
    function drawNewButton() {
        state = 'DRAWING';
        say("Aku gambar menu baru ya...");
        let bx = posX, by = posY + 80;
        
        // Efek kapur
        cCtx.strokeStyle = "rgba(255,255,255,0.5)";
        cCtx.beginPath(); cCtx.arc(bx+50, by+20, 30, 0, Math.PI*2); cCtx.stroke();

        setTimeout(() => {
            let btn = document.createElement('div');
            btn.className = 'chalk-btn';
            btn.style.left = bx + 'px';
            btn.style.top = by + 'px';
            btn.innerText = "MT5 LIVE DATA";
            btn.onclick = () => alert(`Saldo: ${mt5Data.balance}\nFloat: ${mt5Data.floating}`);
            document.getElementById('world').appendChild(btn);
            state = 'IDLE';
        }, 2000);
    }

    function sendChat() {
        let val = chatInput.value.toLowerCase();
        if(!val) return;
        say("Hmm... " + val);
        if(val.includes("trading")) say("Oke, aku pantau XAUUSD.");
        if(val.includes("pindah")) { targetX = 50; targetY = 50; state = 'WALKING'; }
        chatInput.value = "";
    }

    function say(txt) {
        const s = document.getElementById('speech');
        s.innerText = txt; s.style.display = "block";
        setTimeout(() => s.style.display = "none", 3000);
    }

    // DRAG LOGIC
    entity.addEventListener('touchstart', (e) => { isDragging = true; state = 'IDLE'; });
    window.addEventListener('touchmove', (e) => {
        if(isDragging) {
            posX = e.touches[0].clientX - 50;
            posY = e.touches[0].clientY - 60;
            targetX = posX; targetY = posY;
        }
    });
    window.addEventListener('touchend', () => isDragging = false);

    function loop() {
        if(state === 'WALKING') {
            let dx = targetX - posX;
            let dy = targetY - posY;
            posX += dx * 0.03;
            posY += dy * 0.03;
            if(Math.abs(dx) < 1) state = 'IDLE';
        }
        entity.style.left = posX + 'px';
        entity.style.top = posY + 'px';
        drawBody();
        requestAnimationFrame(loop);
    }

    init();
</script>
</body>
</html>
