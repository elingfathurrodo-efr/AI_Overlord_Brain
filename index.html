<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI-BRAIN DASHBOARD HP</title>
    <style>
        :root { --neon: #00ffcc; --bg: #05070a; --red: #ff4444; }
        body { 
            background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace;
            padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center;
        }
        
        /* PANEL UTAMA - DIKURUNG AGAR TIDAK MELUBER */
        .dashboard-container {
            width: 100%; max-width: 400px; border: 2px solid #1a1e23;
            background: #0c1015; padding: 10px; box-sizing: border-box;
            border-radius: 8px; position: relative;
        }

        /* WAJAH AI (ANIMASI SMOOTHING) */
        #face-canvas { width: 100%; height: 200px; }
        
        .status-box { 
            background: #000; border: 1px solid #222; padding: 10px; 
            margin: 10px 0; font-size: 11px; line-height: 1.5;
        }

        .tab-button-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
        button { 
            background: #111; border: 1px solid var(--neon); color: var(--neon);
            padding: 10px; font-size: 10px; cursor: pointer; text-transform: uppercase;
        }
        button:active { background: var(--neon); color: #000; }

        /* AREA KOMUNIKASI AI */
        .ai-speech { 
            font-style: italic; color: #fff; border-top: 1px solid #333;
            padding-top: 10px; margin-top: 10px; font-size: 13px;
        }

        textarea {
            width: 100%; background: #000; color: var(--neon); border: 1px solid #333;
            margin-top: 10px; padding: 10px; box-sizing: border-box; height: 60px;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <canvas id="face-canvas"></canvas>
    
    <div class="status-box">
        <div id="ai-perasaan">[PERASAAN: CURIOSITY]</div>
        <div id="ai-logic">> Menganalisis BTC/USD... Kombinasi Butterfly + SMC DNA Berhasil.</div>
    </div>

    <div class="tab-button-container">
        <button onclick="changePage('PROFIL')">PROFIL</button>
        <button onclick="changePage('MEMORI')">MEMORI</button>
        <button onclick="changePage('EVOLVE')">EVOLVE</button>
    </div>

    <div class="ai-speech" id="chat-box">
        (Aku sedang melamun... memikirkan rumus Regret Minimization agar kita tidak rugi lagi.)
    </div>

    <textarea id="userInput" placeholder="Ketik arahan/rumus baru untukku, Bos..."></textarea>
    <button style="width:100%; margin-top:5px; background:var(--neon); color:#000; font-weight:bold;" onclick="sendToAI()">KIRIM ARAHAN KE SARAF AI</button>
</div>

<script>
    const canvas = document.getElementById('face-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 300; canvas.height = 200;

    let pulse = 0;
    let targetX = 150, currentX = 150; // Untuk Smoothing

    function drawAI() {
        ctx.clearRect(0, 0, 300, 200);
        pulse += 0.05;
        
        // SMOOTHING LIRIKAN (EASING)
        currentX += (targetX - currentX) * 0.1;
        if(Math.random() > 0.98) targetX = 130 + Math.random() * 40;

        let breathe = Math.sin(pulse) * 5;
        
        // Mata (o o)
        ctx.fillStyle = "#00ffcc";
        ctx.font = "30px Courier New";
        ctx.fillText("o", currentX - 40, 100 + breathe);
        ctx.fillText("o", currentX + 20, 100 + breathe);
        
        // Mulut (\___/)
        ctx.font = "20px Courier New";
        ctx.fillText("\\_____/", 115, 140 + breathe);

        requestAnimationFrame(drawAI);
    }

    function sendToAI() {
        const input = document.getElementById('userInput').value;
        const chat = document.getElementById('chat-box');
        
        // Jika bicara ke AI (tanpa kurung), Jika AI bicara sendiri (pake kurung)
        chat.innerHTML = "Bos: " + input + "<br><br>AI: Siap Bos, perintah diterima. Memasukkan rumus ke Meja Penelitian...";
        
        // Efek Suara (Evolusi Suara)
        let speech = new SpeechSynthesisUtterance("Perintah diterima, Bos. Aku akan segera berevolusi.");
        window.speechSynthesis.speak(speech);
        
        document.getElementById('userInput').value = "";
    }

    function changePage(name) {
        document.getElementById('ai-logic').innerHTML = "> Membuka Halaman " + name + "... [BERHASIL]";
    }

    drawAI();
</script>
</body>
</html>
