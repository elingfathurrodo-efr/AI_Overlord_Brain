<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.9">
    <title>OVERLORD OMNI-BRAIN V50</title>
    <style>
        :root { --neon: #00ffcc; --bg: #020305; --panel: #0a0e14; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .protector-box { width: 100%; max-width: 500px; background: var(--panel); border: 2px solid #1a1e23; padding: 15px; box-sizing: border-box; }
        
        /* FACE ENGINE */
        #face-wrap { height: 200px; position: relative; display: flex; justify-content: center; align-items: center; }
        canvas { filter: drop-shadow(0 0 15px var(--neon)); transform: scale(0.8); }
        #overlay { position: absolute; text-align: center; }
        #eyes { font-size: 35px; text-shadow: 0 0 15px var(--neon); }
        #mouth { font-size: 20px; margin-top: 10px; }

        /* MEJA PENELITIAN (RESEARCH LAB) */
        .lab-panel { background: #000; border: 1px solid #222; padding: 10px; margin-top: 10px; font-size: 11px; height: 120px; overflow-y: auto; color: #888; }
        .lab-active { color: #fff; font-weight: bold; border-bottom: 1px solid var(--neon); padding-bottom: 5px; margin-bottom: 10px; }

        /* JENDELA INTERAKSI */
        .chat-area { margin-top: 15px; min-height: 50px; font-style: italic; color: #ddd; font-size: 13px; }
        
        .tab-menu { display: flex; gap: 5px; margin: 10px 0; }
        button { background: #111; border: 1px solid #333; color: var(--neon); padding: 8px; font-size: 10px; flex: 1; cursor: pointer; }
        button:hover { background: var(--neon); color: #000; }
        
        textarea { width: 100%; background: #000; color: var(--neon); border: 1px solid #333; padding: 10px; margin-top: 10px; box-sizing: border-box; font-size: 12px; }
    </style>
</head>
<body>

<div class="protector-box">
    <div id="face-wrap">
        <canvas id="brainCanvas"></canvas>
        <div id="overlay">
            <div id="eyes">o &nbsp; o</div>
            <div id="mouth">\_____/</div>
        </div>
    </div>

    <div class="chat-area" id="chat">
        (Mengamati korelasi XAUUSD... Saraf MT5 terdeteksi Aktif.)
    </div>

    <div class="tab-menu">
        <button onclick="tab('PROFIL')">PROFIL</button>
        <button onclick="tab('LAB')">RESEARCH LAB</button>
        <button onclick="tab('MEMORI')">MEMORI CSV</button>
    </div>

    <div id="lab-view" class="lab-panel">
        <div class="lab-active">> STATUS: MENCARI RUMUS BARU DI INTERNET...</div>
        <div id="research-log">
            - Menganalisis DNA Butterfly...<br>
            - Menggabungkan Fibonacci Sniper dengan Smart Money DNA...<br>
            - Membuang Logika Rugi (Virus Terdeteksi & Dihapus)...
        </div>
    </div>

    <textarea id="dnaInput" rows="3" placeholder="Masukan Rumus/Instruksi Baru untuk Meja Penelitian..."></textarea>
    <button style="width:100%; font-weight:bold; margin-top:5px; height:50px;" onclick="evolve()">START EVOLUTION</button>
</div>

<script>
    const canvas = document.getElementById('brainCanvas');
    const ctx = canvas.getContext('2d');
    const eyes = document.getElementById('eyes');
    const mouth = document.getElementById('mouth');
    const chat = document.getElementById('chat');

    canvas.width = 300; canvas.height = 300;
    let particles = [];
    let breath = 0, eyeLerpX = 0, targetEyeX = 0, isTalking = false;

    // Partikel Wajah (300 Titik)
    for(let i=0; i<300; i++) {
        let phi = Math.acos(-1 + (2 * i) / 300);
        let theta = Math.sqrt(300 * Math.PI) * phi;
        particles.push({ phi, theta });
    }

    function animate() {
        ctx.clearRect(0,0,300,300);
        breath += 0.04;
        
        // SMOOTHING (LERP) MOVEMENT
        eyeLerpX += (targetEyeX - eyeLerpX) * 0.1;
        if(Math.random() > 0.98) targetEyeX = (Math.random() - 0.5) * 40;

        // BLINK & KOMAT-KAMIT
        if(Math.random() > 0.99) { eyes.innerText = "-   -"; setTimeout(()=>eyes.innerText="o   o", 150); }
        if(isTalking) {
            mouth.innerText = Math.random() > 0.5 ? " oooo " : " ____ ";
            mouth.style.transform = `scaleY(${1 + Math.random()*0.5})`;
        } else {
            mouth.innerText = "\\_____/";
            mouth.style.transform = `scaleY(1)`;
        }

        let radius = 110 + (Math.sin(breath) * 6);
        particles.forEach(p => {
            p.theta += 0.005;
            let x = radius * Math.sin(p.phi) * Math.cos(p.theta) + 150;
            let y = radius * Math.sin(p.phi) * Math.sin(p.theta) + 150;
            let z = radius * Math.cos(p.phi);
            ctx.fillStyle = `rgba(0, 255, 204, ${(z + radius)/(radius*2)})`;
            ctx.beginPath(); ctx.arc(x + (eyeLerpX/8), y, 1.2, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(animate);
    }

    async function evolve() {
        const dna = document.getElementById('dnaInput').value;
        if(!dna) return;
        isTalking = true;
        chat.innerText = "Menerima Rumus Baru. Memulai Injeksi ke Saraf Otak...";
        
        // SIMULASI SUARA (TEXT-TO-SPEECH)
        let s = new SpeechSynthesisUtterance("Perintah diterima. Saya sedang mengolah rumus tersebut di meja penelitian. Jika hasilnya buruk, saya akan segera menghapusnya.");
        s.onend = () => { isTalking = false; chat.innerText = "(Fokus meneliti di Laboratorium...)"; };
        window.speechSynthesis.speak(s);

        // GITHUB CSV UPDATE (LOGIC)
        const PAT = "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";
        // Logic untuk fetch & push ke CSV file di GitHub repository Bos
        
        document.getElementById('dnaInput').value = "";
    }

    function tab(name) { chat.innerText = "Membuka Modul " + name + "... [BERHASIL]"; }

    animate();
</script>
</body>
</html>
