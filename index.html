<!DOCTYPE html>
<html>
<head>
    <title>OVERLORD V100 COMMAND</title>
    <style>
        body { background: #000; color: #00f2ff; font-family: 'Courier New'; text-align: center; }
        .led-matrix { display: grid; grid-template-columns: repeat(10, 15px); gap: 5px; justify-content: center; margin: 20px; }
        .dot { width: 15px; height: 15px; border-radius: 50%; background: #111; }
        .active-green { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .active-red { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        .status-box { border: 1px solid #00f2ff; padding: 15px; margin: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>OVERLORD V100 BRAIN</h1>
    
    <div class="led-matrix" id="matrix"></div>

    <div class="status-box">
        <h2 id="emotion">EMOTION: CALM</h2>
        <p id="thought">(...aku sedang mengamati market...)</p>
        <div style="font-size: 30px;" id="ascii-face">[ o o ]</div>
    </div>

    <div class="status-box">
        <p>STRATEGY EVOLUTION: <b id="strat">BUTTERFLY+SMC</b></p>
        <p>PRESSURE LEVEL: <span id="press">0%</span></p>
    </div>

    <button onclick="speak()">🎙️ DENGARKAN PIKIRAN AI</button>

    <script src="http://www.qqpr.com/ascii/js/1022.js"></script>
    <script>
        // Membuat Matrix Titik (LED TV Style)
        const matrix = document.getElementById('matrix');
        for(let i=0; i<100; i++) {
            let dot = document.createElement('div');
            dot.className = 'dot';
            matrix.appendChild(dot);
        }

        function updateUI(data) {
            document.getElementById('emotion').innerText = "EMOTION: " + data.emotion;
            document.getElementById('thought').innerText = data.thought;
            document.getElementById('press').innerText = data.pressure + "%";
            
            // Berikan warna pada matrix berdasarkan emosi
            const dots = document.querySelectorAll('.dot');
            dots.forEach(d => {
                d.className = 'dot ' + (data.profit > 0 ? 'active-green' : 'active-red');
            });
        }

        function speak() {
            let msg = document.getElementById('thought').innerText;
            let speech = new SpeechSynthesisUtterance(msg);
            speech.lang = 'id-ID';
            window.speechSynthesis.speak(speech);
        }

        // Simulasi pembacaan CSV dari GitHub/Local
        setInterval(() => {
            // Fetch data dari brain_memory.csv
        }, 5000);
    </script>
</body>
</html>
