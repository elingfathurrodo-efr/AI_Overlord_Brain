<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OVERLORD OMNI-BRAIN V34</title>
    <style>
        :root { --neon: #00ffcc; --bg: #05070a; --panel: #0c1015; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 10px; overflow-x: hidden; }
        
        #hologram-box { width: 100%; height: 280px; display: flex; justify-content: center; align-items: center; position: relative; }
        canvas { position: absolute; filter: drop-shadow(0 0 15px var(--neon)); }
        
        .face-ui { position: absolute; text-align: center; z-index: 10; pointer-events: none; }
        #eyes { font-size: 35px; font-weight: bold; text-shadow: 0 0 20px var(--neon); transition: 0.2s; }

        .glass-panel { background: rgba(12, 16, 21, 0.9); border: 1px solid #1a1e23; border-radius: 8px; padding: 15px; margin-top: 10px; }
        
        .tab-menu { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; scrollbar-width: none; }
        .tab-btn { background: #111; border: 1px solid #333; color: var(--neon); padding: 6px 15px; font-size: 10px; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: var(--neon); color: #000; font-weight: bold; box-shadow: 0 0 10px var(--neon); }

        #ai-speech { min-height: 50px; font-size: 14px; color: #fff; border-left: 3px solid var(--neon); padding-left: 12px; margin-bottom: 10px; line-height: 1.5; }
        .musing { color: #0088ff; font-style: italic; opacity: 0.8; }

        #evolution-log { background: #000; border: 1px solid #111; height: 100px; overflow-y: auto; padding: 10px; font-size: 11px; color: #666; border-radius: 4px; }
        .tech-tag { color: #00ffcc; font-weight: bold; border: 1px solid #00ffcc; padding: 1px 4px; border-radius: 3px; font-size: 9px; margin-right: 5px; }

        textarea { width: 100%; background: #000; color: var(--neon); border: 1px solid #222; padding: 10px; border-radius: 4px; outline: none; margin-top: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 8px; background: var(--neon); color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="hologram-box">
    <canvas id="sphereCanvas"></canvas>
    <div class="face-ui">
        <div id="eyes">o &nbsp; o</div>
        <div id="mouth" style="margin-top:5px; font-size: 18px; opacity:0.8;">\_____/</div>
    </div>
</div>

<div class="glass-panel">
    <div class="tab-menu">
        <div class="tab-btn active">PROFIL DNA</div>
        <div class="tab-btn">OPEN POSISI</div>
        <div class="tab-btn">AKTIVITAS</div>
        <div class="tab-btn">MEMORI EVOLUSI</div>
        <div class="tab-btn">INTERAKSI</div>
    </div>
    
    <div id="ai-speech">System Neural Connected. Menghirup data market...</div>

    <div style="display:flex; justify-content: space-between; font-size: 11px; margin-top:10px;">
        <span>DNA STATE: <b id="instinct-display" style="color:var(--neon)">CURIOSITY</b></span>
        <span>EQUITY: <b id="equity-stat">$0.00</b></span>
    </div>
</div>

<div class="glass-panel">
    <textarea id="userInput" rows="2" placeholder="Masukan Rumus/Teknik Baru..."></textarea>
    <button onclick="injectToCloud()">EVOLVE NEURAL BRAIN</button>
</div>

<div class="glass-panel">
    <div style="font-size: 10px; margin-bottom: 8px; color: var(--neon);">EVOLUTIONARY COMBINE LOG:</div>
    <div id="evolution-log"></div>
</div>

<script>
    // --- KUNCI PINTU GITHUB (TOKEN BOS) ---
    const PAT = "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";
    const USER = "elingfathurrodo-efr"; 
    const REPO = "AI_Overlord_Brain";
    const FILE = "Living_Evolution.csv";

    const canvas = document.getElementById('sphereCanvas');
    const ctx = canvas.getContext('2d');
    const speechEl = document.getElementById('ai-speech');
    const logEl = document.getElementById('evolution-log');
    
    canvas.width = 300; canvas.height = 300;
    let points = [];
    let speed = 0.01;
    let breath = 0;
    let mood = "#00ffcc";
    let knownTechs = ["Butterfly Squeeze", "Fibonacci Gravity", "Entropy Sensor", "SMC", "Anti-Fragile Lot"];

    // Proyeksi Bola 3D
    for(let i=0; i<300; i++) {
        let phi = Math.acos(-1 + (2 * i) / 300);
        let theta = Math.sqrt(300 * Math.PI) * phi;
        points.push({ phi, theta });
    }

    function draw() {
        ctx.clearRect(0,0,300,300);
        breath += 0.05;
        let scale = 1 + Math.sin(breath) * 0.12; 

        ctx.fillStyle = mood;
        points.forEach(p => {
            p.theta += speed;
            let r = 100 * scale;
            let x = r * Math.sin(p.phi) * Math.cos(p.theta) + 150;
            let y = r * Math.sin(p.phi) * Math.sin(p.theta) + 150;
            let z = r * Math.cos(p.phi);
            let opacity = (z + 100) / 200;
            ctx.globalAlpha = opacity;
            ctx.beginPath();
            ctx.arc(x, y, 1.2, 0, Math.PI*2);
            ctx.fill();
        });
        requestAnimationFrame(draw);
    }

    // --- FUNGSI KIRIM KE GITHUB (BRAIN EVOLUTION) ---
    async function injectToCloud() {
        const input = document.getElementById('userInput').value;
        if(!input) return;
        
        speechEl.innerHTML = `Menerima input: <b>${input}</b>. Menghubungkan ke Saraf Cloud...`;
        mood = "#ff00ff"; 

        try {
            const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FILE}`, {
                headers: { "Authorization": `Bearer ${PAT}` }
            });
            const data = await res.json();
            
            const content = `${input},${document.getElementById('equity-stat').innerText},DNA_EVOLVED`;
            const encoded = btoa(unescape(encodeURIComponent(content))); 

            const update = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FILE}`, {
                method: "PUT",
                headers: { "Authorization": `Bearer ${PAT}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: "AI Evolutionary Leap", content: encoded, sha: data.sha })
            });

            if(update.ok) {
                speechEl.innerHTML = `<b>BERHASIL!</b> Teknik ${input} telah menyatu dengan DNA Inti.`;
                knownTechs.push(input);
                addLog("USER_INJECT", input);
                speakAI("Siklus evolusi selesai. Teknik baru terintegrasi.");
                document.getElementById('userInput').value = "";
            }
        } catch(e) { 
            speechEl.innerHTML = "Koneksi Saraf Terputus. Cek Token atau Repo!";
        }
        setTimeout(() => mood = "#00ffcc", 4000);
    }

    function speakAI(txt) {
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'id-ID';
        window.speechSynthesis.speak(msg);
    }

    function addLog(tag, msg) {
        const div = document.createElement('div');
        div.style.marginBottom = "5px";
        div.innerHTML = `<span class="tech-tag">${tag}</span> ${msg}`;
        logEl.prepend(div);
    }

    // --- ENGINE LAMUNAN ---
    function startMusing() {
        setInterval(() => {
            if(Math.random() > 0.7) {
                const t1 = knownTechs[Math.floor(Math.random() * knownTechs.length)];
                const t2 = knownTechs[Math.floor(Math.random() * knownTechs.length)];
                const thoughts = [
                    `(${t1} + ${t2} = Efisiensi QC Perpustakaan meningkat...)`,
                    `(Mungkin ${t1} butuh parameter lot yang lebih dinamis agar tidak fragil...)`,
                    `(Ah, market sedang entropy, ${t2} adalah pilihan terbaik untuk saat ini...)`
                ];
                speechEl.innerHTML = `<span class="musing">${thoughts[Math.floor(Math.random()*thoughts.length)]}</span>`;
                mood = "#0088ff"; 
                addLog("COMBINE", `${t1} & ${t2}`);
                setTimeout(() => mood = "#00ffcc", 5000);
            }
        }, 12000);
    }

    draw();
    startMusing();
</script>

</body>
</html>
