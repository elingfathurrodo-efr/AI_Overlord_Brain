<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OVERLORD V100 - NEON BRAIN</title>
    <style>
        body { background: #000; color: #00f2ff; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 20px; }
        .container { border: 2px solid #00f2ff; padding: 20px; border-radius: 20px; background: #050505; box-shadow: 0 0 30px rgba(0,242,255,0.2); display: inline-block; width: 90%; max-width: 400px; }
        
        /* WAJAH NEON DOTS */
        .matrix { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; width: 150px; margin: 20px auto; }
        .dot { width: 10px; height: 10px; background: #111; border-radius: 2px; transition: 0.2s; }
        .active { background: #00f2ff; box-shadow: 0 0 10px #00f2ff; }
        .glitch { background: #ff0055; box-shadow: 0 0 10px #ff0055; animation: blink 0.1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        .thought-box { font-style: italic; color: #888; padding: 15px; background: #0a0a0a; border-radius: 10px; margin: 15px 0; min-height: 50px; font-size: 13px; border: 1px dashed #333; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-item { border: 1px solid #222; padding: 10px; border-radius: 8px; background: #080808; }
        button { background: #00f2ff; color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="matrix" id="matrix"></div>
        <h2 id="status">SCANNING...</h2>
        <div class="thought-box" id="thought">"Mencoba memulung data dari badan di laptop..."</div>
        <div class="stat-grid">
            <div class="stat-item">LVL<br><b id="lvl">1</b></div>
            <div class="stat-item">PROFIT<br><b id="profit">$0.00</b></div>
        </div>
        <button onclick="speak()">🎙️ DENGARKAN PIKIRAN AI</button>
    </div>

    <script>
        const matrix = document.getElementById('matrix');
        for(let i=0; i<30; i++) {
            let d = document.createElement('div');
            d.className = 'dot';
            matrix.appendChild(d);
        }

        async function updateUI() {
            try {
                const res = await fetch('https://raw.githubusercontent.com/elingfathurrodo-efr/AI_Overlord_Brain/main/Judge_V25.csv?t=' + new Date().getTime());
                const text = await res.text();
                const d = text.trim().split('\n').pop().split(',');

                document.getElementById('lvl').innerText = d[0];
                const emo = d[1];
                document.getElementById('status').innerText = "STATUS: " + emo;
                document.getElementById('profit').innerText = "$" + d[2];
                document.getElementById('thought').innerText = d[3];

                const dots = document.querySelectorAll('.dot');
                dots.forEach(dot => {
                    dot.className = 'dot';
                    if(Math.random() > 0.6) {
                        dot.classList.add(emo === 'PANIC' ? 'glitch' : 'active');
                    }
                });
            } catch(e) { console.log("Syncing..."); }
        }

        function speak() {
            const uttr = new SpeechSynthesisUtterance(document.getElementById('thought').innerText);
            uttr.lang = 'id-ID';
            window.speechSynthesis.speak(uttr);
        }

        setInterval(updateUI, 5000);
        updateUI();
    </script>
</body>
</html>
