<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-PROFESSOR V100</title>
    <style>
        :root { --neon: #00ffcc; --gold: #ffd700; --bg: #010203; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; touch-action: none; }
        
        #lab { width: 100vw; height: 100vh; position: relative; background: radial-gradient(circle at center, #0a1118 0%, #010203 100%); }

        /* FURNITUR PERMANEN */
        .prop { position: absolute; border: 1px solid rgba(0, 255, 200, 0.3); padding: 10px; background: rgba(0,0,0,0.5); font-size: 10px; text-align: center; }
        #desk { bottom: 80px; left: 20px; width: 120px; height: 60px; border-top: 3px solid var(--neon); }
        #trash { bottom: 20px; right: 20px; width: 40px; height: 50px; border-radius: 0 0 5px 5px; }
        #mt5-portal { top: 50%; right: -10px; width: 50px; height: 100px; border: 2px dashed var(--gold); display: flex; align-items: center; justify-content: center; writing-mode: vertical-rl; }

        /* STICKMAN ENTITAS */
        #ai-entity { position: absolute; width: 100px; height: 120px; z-index: 1000; transition: opacity 0.5s; }
        
        /* BUKU HARIAN RUMUS (PERMANEN) */
        #diary-panel { 
            position: fixed; top: 10px; left: 10px; width: 200px; max-height: 150px; 
            background: rgba(0,20,20,0.9); border: 1px solid var(--gold); padding: 10px; 
            font-size: 9px; overflow-y: auto; display: block; z-index: 2000;
        }

        /* OVERLAY SENSOR GELAP */
        #dark-overlay { position: fixed; inset: 0; background: black; opacity: 0; pointer-events: none; z-index: 9999; transition: opacity 0.5s; }

        .chalk-btn { position: absolute; border: 1px solid #fff; background: rgba(255,255,255,0.1); color: #fff; padding: 5px; font-size: 9px; }
    </style>
</head>
<body>

<div id="lab">
    <div id="dark-overlay"></div>
    
    <div id="desk" class="prop">MEJA RISET<br>(Belajar...)</div>
    <div id="trash" class="prop">TONG</div>
    <div id="mt5-portal">PORTAL MT5</div>

    <div id="diary-panel">
        <b style="color:var(--gold)">📔 DIARI RUMUS (GitHub)</b>
        <div id="formula-list">- Kedip_Logic_v1<br>- Fibonacci_Retrace_v2</div>
    </div>

    <div id="ai-entity">
        <div id="speech" style="position:absolute; bottom:110%; background:white; color:black; padding:5px; border-radius:5px; font-size:9px; display:none; width:100px;">...</div>
        <canvas id="bodyCanvas" width="100" height="120"></canvas>
    </div>
</div>

<script>
    const entity = document.getElementById('ai-entity');
    const bCtx = document.getElementById('bodyCanvas').getContext('2d');
    const darkOverlay = document.getElementById('dark-overlay');
    
    let posX = 150, posY = window.innerHeight - 200;
    let targetX = posX, targetY = posY;
    let state = 'STUDYING', frame = 0, mood = 'NEUTRAL';
    let knowledge = ["SMC_Basics"];

    function init() {
        loop();
        checkLight();
        setInterval(autoLife, 8000);
    }

    // ANIMASI TUBUH PROFESOR (DUDUK/BERDIRI)
    function drawStickman() {
        bCtx.clearRect(0,0,100,120);
        frame += 0.07;
        let breath = Math.sin(frame) * 2;
        
        bCtx.strokeStyle = varColor(); bCtx.lineWidth = 3; bCtx.lineCap = "round";
        let cx = 50, cy = 40 + breath;

        // Kepala
        bCtx.beginPath(); bCtx.arc(cx, cy, 15, 0, Math.PI*2); bCtx.stroke();
        // Kacamata Profesor
        bCtx.beginPath(); bCtx.rect(cx-10, cy-2, 8, 5); bCtx.rect(cx+2, cy-2, 8, 5); bCtx.stroke();

        // Badan
        let sBot = cy + 35;
        if(state === 'STUDYING') {
            // Pose Duduk di Meja
            bCtx.beginPath(); bCtx.moveTo(cx, cy+15); bCtx.lineTo(cx, sBot); bCtx.stroke();
            bCtx.beginPath(); bCtx.moveTo(cx, sBot); bCtx.lineTo(cx-20, sBot+10); bCtx.lineTo(cx-20, sBot+30); bCtx.stroke(); // Kaki tekuk
            bCtx.beginPath(); bCtx.moveTo(cx, cy+20); bCtx.lineTo(cx-15, cy+40); bCtx.lineTo(cx-5, cy+45); bCtx.stroke(); // Tangan nulis
        } else {
            // Pose Berdiri/Jalan
            let walk = (state === 'WALKING') ? Math.sin(frame*8)*10 : 0;
            bCtx.beginPath(); bCtx.moveTo(cx, cy+15); bCtx.lineTo(cx, sBot); bCtx.stroke();
            bCtx.beginPath(); bCtx.moveTo(cx, sBot); bCtx.lineTo(cx-10-walk, sBot+40); bCtx.stroke();
            bCtx.beginPath(); bCtx.moveTo(cx, sBot); bCtx.lineTo(cx+10+walk, sBot+40); bCtx.stroke();
        }
    }

    function varColor() { return mood === 'ANGRY' ? '#ff4444' : '#00ffcc'; }

    // LOGIKA OTOMATIS (BELAJAR, KERJA, INTERNET)
    function autoLife() {
        let r = Math.random();
        if(r < 0.3) {
            state = 'WALKING'; targetX = 200 + Math.random()*100; say("Cari referensi dulu...");
        } else if(r < 0.6) {
            state = 'STUDYING'; posX = 40; posY = window.innerHeight - 180; say("Nemu rumus baru di internet!");
            learnNewThing();
        } else if(r < 0.7) {
            goToWork();
        }
    }

    function learnNewThing() {
        let skills = ["Fibonacci_X", "OrderBlock_V2", "Liquidity_Hunt"];
        let newSkill = skills[Math.floor(Math.random()*skills.length)];
        if(!knowledge.includes(newSkill)) {
            knowledge.push(newSkill);
            document.getElementById('formula-list').innerHTML += `<br>- ${newSkill}`;
        }
    }

    function goToWork() {
        say("MT5 Buka! Aku kerja dulu Bos!");
        targetX = window.innerWidth;
        state = 'WALKING';
        setTimeout(() => { entity.style.opacity = "0"; }, 1000);
        setTimeout(() => { 
            entity.style.opacity = "1"; posX = window.innerWidth - 100; targetX = 200; 
            say("Hasil kerja hari ini: Profit!");
        }, 5000);
    }

    // SENSOR CAHAYA (KAMERA SIMULATION)
    async function checkLight() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            // Simulasi deteksi kegelapan sederhana (biasanya butuh canvas processing)
            // Di sini kita pakai logika sederhana: Jika layar disentuh lama, dianggap gelap.
        } catch(e) { console.log("Camera access denied"); }
    }

    function say(t) {
        const s = document.getElementById('speech');
        s.innerText = t; s.style.display = "block";
        setTimeout(() => s.style.display = "none", 3000);
    }

    function loop() {
        if(state === 'WALKING') {
            posX += (targetX - posX) * 0.05;
            if(Math.abs(targetX - posX) < 1) state = 'IDLE';
        }
        entity.style.left = posX + 'px';
        entity.style.top = posY + 'px';
        drawStickman();
        requestAnimationFrame(loop);
    }

    init();
</script>
</body>
</html>
