<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OVERLORD OMNI-BRAIN V28.5</title>
    <style>
        :root { --neon: #00ffcc; --bg: #05070a; --panel: #0c1015; --danger: #ff4444; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 10px; overflow: hidden; }
        
        /* 300 DOTS HOLOGRAM CONTAINER */
        #hologram-box {
            width: 100%;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        canvas { position: absolute; filter: blur(0.5px); }
        .face-ui {
            position: absolute;
            text-align: center;
            font-size: 30px;
            font-weight: bold;
            text-shadow: 0 0 20px var(--neon);
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* UI PANEL */
        .glass-panel {
            background: rgba(12, 16, 21, 0.9);
            border: 1px solid #1a1e23;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
        }
        .thought { font-style: italic; font-size: 13px; color: #888; border-left: 3px solid var(--neon); padding-left: 10px; min-height: 40px; }
        
        textarea { width: 100%; background: #000; color: var(--neon); border: 1px solid #1a1e23; padding: 10px; box-sizing: border-box; border-radius: 4px; }
        button { width: 100%; padding: 12px; margin-top: 8px; background: var(--neon); color: #000; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }
        
        #log-window { font-size: 10px; color: #555; height: 80px; overflow-y: auto; margin-top: 10px; border-top: 1px solid #111; }
    </style>
</head>
<body>

<div id="hologram-box">
    <canvas id="faceCanvas"></canvas>
    <div class="face-ui">
        <div id="eyes">^ &nbsp; ^</div>
        <div id="mouth" style="margin-top:5px">v---v</div>
    </div>
</div>

<div class="glass-panel">
    <div class="thought" id="ai-thought">"Membangunkan koneksi saraf..."</div>
    <div style="margin-top:10px; display: flex; justify-content: space-between; font-size: 12px;">
        <span>DNA: <b id="dna-stat">STABLE</b></span>
        <span>EQUITY: <b id="equity-stat">$0.00</b></span>
    </div>
</div>

<div class="glass-panel">
    <textarea id="userInput" rows="3" placeholder="Masukan Rumus/Teknik Baru..."></textarea>
    <button onclick="evolveBrain()">INJECT NEW KNOWLEDGE</button>
    <div id="log-window">> System Active. Waiting for instruction...</div>
</div>

<script>
    // --- KONFIGURASI SARAF GITHUB ---
    const PAT = "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";
    const USER = "elingfathurrodo-efr"; // Ganti jika berbeda
    const REPO = "AI_Overlord_Brain";
    const FILE = "Living_Evolution.csv";

    // --- ENGINE HOLOGRAM (300 TITIK BERGERAK) ---
    const canvas = document.getElementById('faceCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 300; canvas.height = 300;
    let dots = [];
    let speedMult = 1;

    for(let i=0; i<300; i++) {
        dots.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 2,
            vy: (Math.random() - 0.5) * 2,
            originX: Math.random() * canvas.width,
            originY: Math.random() * canvas.height
        });
    }

    function animate() {
        ctx.clearRect(0,0,300,300);
        ctx.fillStyle = speedMult > 2 ? "#ff4444" : "#00ffcc";
        
        dots.forEach(d => {
            d.x += d.vx * speedMult;
            d.y += d.vy * speedMult;
            
            // Pantulan di dalam area
            if(d.x < 50 || d.x > 250) d.vx *= -1;
            if(d.y < 50 || d.y > 250) d.vy *= -1;
            
            ctx.beginPath();
            ctx.arc(d.x, d.y, 1, 0, Math.PI*2);
            ctx.fill();
        });
        requestAnimationFrame(animate);
    }
    animate();

    // --- FUNGSI EVOLUSI (MENULIS KE GITHUB) ---
    async function evolveBrain() {
        const input = document.getElementById('userInput').value;
        if(!input) return;

        log("Mengirim ilmu ke Otak Cloud...");
        
        try {
            // 1. Ambil data file terakhir untuk dapatkan SHA
            const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FILE}`, {
                headers: { "Authorization": `Bearer ${PAT}` }
            });
            const data = await res.json();
            
            // 2. Buat isi file baru (Belajar dari input)
            const newContent = `${input},${document.getElementById('equity-stat').innerText},DNA_EVOLVED`;
            const encoded = btoa(newContent); // Encode ke Base64

            // 3. Update file di GitHub
            const update = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FILE}`, {
                method: "PUT",
                headers: {
                    "Authorization": `Bearer ${PAT}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: "AI Evolution: New Knowledge Injected",
                    content: encoded,
                    sha: data.sha
                })
            });

            if(update.ok) {
                log("Evolusi Berhasil! Wajah bermutasi.");
                mutateFace(input);
                document.getElementById('userInput').value = "";
            }
        } catch(e) { log("Error Saraf: " + e); }
    }

    function mutateFace(input) {
        speedMult = 4; // Gerakan jadi cepat saat belajar
        document.getElementById('eyes').innerText = "> &nbsp; <";
        document.getElementById('ai-thought').innerText = "Menerima input: " + input;
        
        setTimeout(() => {
            speedMult = 1;
            document.getElementById('eyes').innerText = "o &nbsp; o";
        }, 3000);
    }

    function log(msg) {
        const l = document.getElementById('log-window');
        l.innerHTML = `> ${msg}<br>` + l.innerHTML;
    }

    // --- AUTO SYNC (Membaca hasil belajar dari MT5) ---
    async function sync() {
        try {
            const r = await fetch(`https://raw.githubusercontent.com/${USER}/${REPO}/main/${FILE}?t=${Date.now()}`);
            const text = await r.text();
            const d = text.split(',');
            if(d.length > 1) {
                document.getElementById('equity-stat').innerText = d[1];
                document.getElementById('dna-stat').innerText = d[2] || "ACTIVE";
            }
        } catch(e) {}
    }
    setInterval(sync, 5000);
</script>

</body>
</html>
