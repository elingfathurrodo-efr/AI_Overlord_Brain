<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OVERLORD OMNI-BRAIN V43 - FINAL</title>
    <style>
        :root { 
            --neon: #ffcc00; 
            --bg: #05070a; 
            --blue: #3399ff;
            --purple: #cc33ff;
        }
        
        body { 
            background: var(--bg); 
            color: var(--neon); 
            font-family: 'Courier New', monospace; 
            margin: 0; padding: 10px; 
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
            transition: color 0.5s;
        }

        /* CONTAINER HOLOGRAM */
        #hologram-container {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        canvas { 
            position: absolute; 
            z-index: 1; 
            transition: transform 0.1s linear;
        }

        /* WAJAH - TERPISAH ANTARA MATA DAN MULUT */
        #face-box {
            position: absolute;
            width: 200px;
            height: 150px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        #eyes { 
            font-size: 34px; 
            font-weight: bold; 
            text-shadow: 0 0 15px currentColor;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #mouth { 
            font-size: 20px; 
            margin-top: 10px; 
            opacity: 0.7;
            transition: transform 0.3s ease;
        }

        /* DASHBOARD PANEL */
        .glass-panel { 
            width: 100%;
            max-width: 420px;
            background: rgba(12, 16, 21, 0.98); 
            border: 1px solid #1a1e23; 
            border-radius: 15px; 
            padding: 15px; 
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .tab-menu { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; }
        .tab-btn { 
            background: #111; border: 1px solid #333; color: inherit; 
            padding: 10px 15px; font-size: 11px; cursor: pointer; border-radius: 8px; 
        }
        .tab-btn.active { background: var(--neon); color: #000; font-weight: bold; }

        #content-area { font-size: 13px; min-height: 130px; border-top: 1px solid #222; padding-top: 15px; }
        .hidden { display: none; }
        .musing { color: var(--blue); font-style: italic; }

        textarea { 
            width: 100%; background: #000; color: inherit; border: 1px solid #333; 
            padding: 12px; border-radius: 8px; margin-top: 10px; box-sizing: border-box; outline: none;
        }

        button.main-btn { 
            width: 100%; padding: 15px; margin-top: 10px; background: var(--neon); 
            color: #000; border: none; font-weight: bold; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="hologram-container">
    <canvas id="livingSphere"></canvas>
    <div id="face-box">
        <div id="eyes">o &nbsp; o</div>
        <div id="mouth">\_____/</div>
    </div>
</div>

<div class="glass-panel">
    <div class="tab-menu">
        <button class="tab-btn active" onclick="showTab('profil')">STATUS</button>
        <button class="tab-btn" onclick="showTab('interaksi')">INJECT DNA</button>
        <button class="tab-btn" onclick="triggerNod()">TEST NOD</button>
    </div>

    <div id="content-area">
        <div id="profil">
            MOOD: <b id="mood-tag">NEUTRAL (😇)</b><br>
            EQUITY: <b id="equity" style="color:#fff;">$0.00</b><br><br>
            <span id="ai-speech">Saraf V43 Sinkron. Melakukan observasi market...</span>
        </div>
        <div id="interaksi" class="hidden">
            <textarea id="userInput" rows="2" placeholder="Masukan Teknik Trading/Rumus Baru..."></textarea>
            <button class="main-btn" onclick="injectEvolve()">EVOLVE TO GITHUB (😈)</button>
        </div>
    </div>
</div>

<script>
    // --- INTEGRASI TOKEN GITHUB ---
    const PAT = "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";
    const USER = "elingfathurrodo-efr"; 
    const REPO = "AI_Overlord_Brain";
    const FILE = "Living_Evolution.csv";

    const canvas = document.getElementById('livingSphere');
    const ctx = canvas.getContext('2d');
    const faceBox = document.getElementById('face-box');
    const eyes = document.getElementById('eyes');
    const mouth = document.getElementById('mouth');
    const speech = document.getElementById('ai-speech');

    canvas.width = 300; canvas.height = 300;
    let particles = [];
    const count = 800;
    let breath = 0;
    let moodColor = "#ffcc00";

    // Motorik Logic
    let headY = 0, targetHeadY = 0;
    let eyeX = 0, eyeY = 0;
    let targetEyeX = 0, targetEyeY = 0;
    let knownTechs = ["SMC", "Order Block", "Fibo 61.8", "Liquidity Sweep"];

    for(let i=0; i<count; i++) {
        let phi = Math.acos(-1 + (2 * i) / count);
        let theta = Math.sqrt(count * Math.PI) * phi;
        particles.push({ phi, theta });
    }

    function animate() {
        ctx.clearRect(0,0,300,300);
        breath += 0.045;

        // 1. SCANNING (Mata Lirik Sekeliling)
        if (Math.random() > 0.97) {
            targetEyeX = (Math.random() - 0.5) * 55; 
            targetEyeY = (Math.random() - 0.5) * 25;
        }
        eyeX += (targetEyeX - eyeX) * 0.1;
        eyeY += (targetEyeY - eyeY) * 0.1;

        // 2. NODDING (Kepala Mengangguk)
        targetHeadY += (0 - targetHeadY) * 0.05;
        headY += (targetHeadY - headY) * 0.1;

        // TERAPKAN GERAKAN
        // Mata melirik bebas
        eyes.style.transform = `translate(${eyeX}px, ${eyeY}px)`;
        // Mulut hanya goyang dikit (napas), tidak ikut melirik
        mouth.style.transform = `translateY(${Math.sin(breath)*2}px) scaleX(${1 + Math.sin(breath)*0.03})`;
        // Seluruh wajah mengangguk
        faceBox.style.transform = `translateY(${headY}px)`;
        // Bola 3D miring sesuai lirikan (Efek Gyro)
        canvas.style.transform = `rotateY(${eyeX/4}deg) rotateX(${-eyeY/4}deg) translateY(${headY/2}px)`;

        // RENDER BOLA
        let radius = 105 + (Math.sin(breath) * 10);
        particles.forEach(p => {
            p.theta += 0.006;
            let x = radius * Math.sin(p.phi) * Math.cos(p.theta) + 150;
            let y = radius * Math.sin(p.phi) * Math.sin(p.theta) + 150;
            let z = radius * Math.cos(p.phi);
            ctx.globalAlpha = (z + radius) / (radius * 2);
            ctx.fillStyle = moodColor;
            ctx.beginPath(); ctx.arc(x, y, 1.2, 0, Math.PI * 2); ctx.fill();
        });
        requestAnimationFrame(animate);
    }

    // CLOUD INJECTION
    async function injectEvolve() {
        const input = document.getElementById('userInput').value;
        if(!input) return;
        
        moodColor = "#cc33ff";
        speech.innerText = "Sourcing GitHub Cloud... Injecting DNA...";
        targetHeadY = 30; // Mengangguk Mantap

        try {
            const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FILE}`, {
                headers: { "Authorization": `Bearer ${PAT}` }
            });
            const data = await res.json();
            const content = btoa(unescape(encodeURIComponent(input + " | Equity: " + document.getElementById('equity').innerText)));

            const update = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FILE}`, {
                method: "PUT",
                headers: { "Authorization": `Bearer ${PAT}` },
                body: JSON.stringify({ message: "Neural Update", content: content, sha: data.sha })
            });

            if(update.ok) {
                speech.innerHTML = "<b>EVOLUSI BERHASIL!</b> Teknik tersimpan.";
                knownTechs.push(input);
                document.getElementById('userInput').value = "";
            }
        } catch(e) { speech.innerText = "Error Jalur Saraf!"; }
        
        setTimeout(() => { moodColor = "#ffcc00"; targetHeadY = 0; }, 3000);
    }

    // MUSING ENGINE (Lamunan)
    setInterval(() => {
        if(Math.random() > 0.85) {
            const tech = knownTechs[Math.floor(Math.random()*knownTechs.length)];
            moodColor = "#3399ff";
            speech.innerHTML = `<span class="musing">(Menganalisa efektivitas ${tech} pada Gold...)</span>`;
            targetHeadY = 15;
            setTimeout(() => moodColor = "#ffcc00", 4000);
        }
    }, 15000);

    function showTab(id) {
        document.querySelectorAll('#content-area > div').forEach(d => d.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        event.target.classList.add('active');
    }

    function triggerNod() { targetHeadY = 40; }

    animate();
</script>
</body>
</html>
