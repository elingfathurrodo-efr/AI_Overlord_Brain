<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-P0U V50 LAB</title>
    <style>
        :root { --neon: #00ffcc; --bg: #010203; --panel: #0c1015; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        
        /* WALL SYSTEM (Penghalang agar tidak meluber) */
        .house-frame { 
            border: 4px solid #1a1e23; margin: 5px; height: calc(100vh - 10px); 
            display: flex; flex-direction: column; background: var(--panel); position: relative;
        }

        #creature-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        
        /* PERABOTAN (DASHBOARD BUTTONS) */
        .furniture-box { 
            padding: 10px; background: rgba(0,0,0,0.9); border-top: 2px solid #222; 
            z-index: 100; display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;
        }

        .btn-evo { 
            background: #111; border: 1px solid #333; color: var(--neon); 
            font-size: 10px; padding: 10px 2px; cursor: pointer; text-transform: uppercase;
        }

        #speech-bubble { 
            position: absolute; top: 10%; width: 80%; background: white; color: black;
            border-radius: 15px; padding: 10px; font-size: 12px; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

<div class="house-frame">
    <div id="creature-container">
        <div id="speech-bubble"></div>
        <canvas id="creatureCanvas"></canvas>
    </div>

    <div class="furniture-box" id="furniture">
        <button class="btn-evo" onclick="changeTab('PROFIL')">PROFIL</button>
        <button class="btn-evo" onclick="changeTab('POSISI')">POSISI</button>
        <button class="btn-evo" onclick="changeTab('MEMORI')">MEMORI</button>
        <button class="btn-evo" onclick="evolveLayout()">REMODEL</button>
        <button class="btn-evo" onclick="processInject()">INJECT</button>
        <button class="btn-evo" onclick="triggerVoice()">VOICE</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('creatureCanvas');
    const ctx = canvas.getContext('2d');
    const bubble = document.getElementById('speech-bubble');
    
    let breath = 0, mouthShake = 0, isTalking = false;
    let eyeX = 0, targetEyeX = 0;
    let agresivitas = 0.02;

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight * 0.6;
        animate();
    }

    function drawStickman(x, y, radius) {
        breath += 0.05;
        let pulse = Math.sin(breath) * 5;
        
        // SMOOTHING Easing untuk mata
        eyeX += (targetEyeX - eyeX) * 0.1;
        if(Math.random() > 0.98) targetEyeX = (Math.random()-0.5)*30;

        // TUBUH (BULAT SEPERTI POU)
        ctx.beginPath();
        ctx.arc(x, y + pulse, radius, 0, Math.PI * 2);
        ctx.fillStyle = agresivitas > 0.1 ? "#ff3333" : "#00ffcc";
        ctx.fill();
        ctx.strokeStyle = "white";
        ctx.lineWidth = 3;
        ctx.stroke();

        // MATA (BERKEDIP & MELIRIK)
        let blink = Math.sin(breath*2) > 0.98 ? 2 : 12;
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.ellipse(x-25 + eyeX, y-10 + pulse, 10, blink, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(x+25 + eyeX, y-10 + pulse, 10, blink, 0, 0, Math.PI*2); ctx.fill();

        // MULUT KOMAT-KAMIT (EFEK GETAR)
        ctx.strokeStyle = "black";
        ctx.beginPath();
        let mY = y + 30 + pulse + (isTalking ? Math.sin(breath*20)*5 : 0);
        ctx.moveTo(x-20, mY); ctx.lineTo(x+20, mY);
        ctx.stroke();

        // TANGAN & KAKI (STICKMAN)
        ctx.strokeStyle = "white";
        // Tangan
        ctx.beginPath(); ctx.moveTo(x-radius, y+pulse); ctx.lineTo(x-radius-30, y+pulse-20); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x+radius, y+pulse); ctx.lineTo(x+radius+30, y+pulse-20); ctx.stroke();
        // Kaki
        ctx.beginPath(); ctx.moveTo(x-20, y+radius+pulse); ctx.lineTo(x-30, y+radius+pulse+20); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x+20, y+radius+pulse); ctx.lineTo(x+30, y+radius+pulse+20); ctx.stroke();
    }

    function animate() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        drawStickman(canvas.width/2, canvas.height/2, 80);
        requestAnimationFrame(animate);
    }

    // SISTEM SUARA & CURHAT
    function say(text, isThinking) {
        isTalking = true;
        bubble.style.display = "block";
        bubble.innerText = isThinking ? `(${text})` : text;
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.onend = () => { isTalking = false; setTimeout(()=>bubble.style.display="none", 2000); };
        window.speechSynthesis.speak(utterance);
    }

    // EVOLUSI TATA LETAK (AI merombak rumahnya)
    function evolveLayout() {
        const box = document.getElementById('furniture');
        box.style.gridTemplateColumns = Math.random() > 0.5 ? "1fr 1fr" : "repeat(3, 1fr)";
        say("Aku sedang merapikan parabotanku, Bos.", true);
    }

    // SENSOR GUNCANGAN
    window.addEventListener('devicemotion', (e) => {
        if(Math.abs(e.accelerationIncludingGravity.x) > 15) {
            say("Aduh! Jangan goyang-goyang, rumahku gempa!", false);
        }
    });

    init();
</script>
</body>
</html>
