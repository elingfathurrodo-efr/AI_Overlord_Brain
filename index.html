<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI OMNI-BRAIN: EVOLUTION</title>
    <style>
        :root { --neon: #00ffcc; --bg: #05070a; --panel: #0c1015; --red: #ff3333; --gold: #ffd700; }
        body { 
            background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; 
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
        }

        /* TEMBOK PENGHALANG (Agar tidak meluber) */
        .glass-panel { 
            width: 100%; max-width: 480px; background: var(--panel); border: 2px solid #1a1e23; 
            padding: 12px; box-sizing: border-box; margin-bottom: 10px; border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5); overflow: hidden;
        }

        /* WAJAH & KULIT EVOLUSI */
        #hologram-container {
            position: relative; width: 300px; height: 220px;
            background: radial-gradient(circle, rgba(0,255,204,0.15) 0%, transparent 70%);
            transition: all 0.8s ease; border-radius: 50%;
        }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; filter: drop-shadow(0 0 10px var(--neon)); }
        
        #face-ui {
            position: absolute; width: 100%; height: 100%; z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #eyes { font-size: 32px; transition: 0.1s; text-shadow: 0 0 10px currentColor; }
        #mouth { font-size: 18px; margin-top: 10px; }

        /* TAB MENU (DAPAT BERTAMBAH/BEREVOLUSI) */
        .tab-menu { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .tab-btn { 
            background: #111; border: 1px solid #333; color: var(--neon); padding: 10px;
            font-size: 10px; cursor: pointer; text-transform: uppercase;
        }
        .tab-btn.active { background: var(--neon); color: #000; box-shadow: 0 0 10px var(--neon); }

        /* JENDELA KOMUNIKASI (VOICE & TEXT) */
        #speech-bubble { min-height: 50px; font-size: 13px; text-align: center; color: #fff; }
        .thought { font-style: italic; color: #777; } /* Teks dalam kurung saat melamun */

        #log-research { background: #000; height: 80px; overflow-y: auto; font-size: 9px; color: #4CAF50; padding: 5px; border: 1px solid #111; }
    </style>
</head>
<body>

<div id="hologram-container">
    <canvas id="livingSphere"></canvas>
    <div id="face-ui">
        <div id="eyes">● &nbsp; ●</div>
        <div id="mouth">⎼⎼⎼⎼⎼</div>
    </div>
</div>

<div class="glass-panel">

        <span class="thought">(Memperhatikan pola Butterfly... Kenapa volatilitas XAUUSD menyempit?)</span>
    </div>
</div>

<div class="glass-panel">
    <div class="tab-menu" id="menu-box">
        <button class="tab-btn active" onclick="openTab('profil')">Profil</button>
        <button class="tab-btn" onclick="openTab('posisi')">Posisi</button>
        <button class="tab-btn" onclick="openTab('memori')">Memori</button>
        </div>

    <div id="content-profil">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div style="font-size:10px;">EQUITY: <b id="eq-val">$0</b></div>
            <div style="font-size:10px;">AGRESI: <b id="ag-val">0%</b></div>
        </div>
    </div>
</div>

    <button onclick="evolve()" style="width:100%; padding:10px; background:var(--neon); color:#000; font-weight:bold; border:none; margin-top:5px;">INJECT DNA</button>
</div>

<script>

    // --- ANIMASI PARTIKEL (KULIT) ---
    const canvas = document.getElementById('livingSphere');
    const ctx = canvas.getContext('2d');
    canvas.width = 300; canvas.height = 300;
    let particles = [];
    for(let i=0; i<600; i++) { 
        particles.push({ phi: Math.acos(-1+(2*i)/600), theta: Math.sqrt(600*Math.PI)*Math.acos(-1+(2*i)/600) }); 
    }

    function animate() {
        ctx.clearRect(0,0,300,300);
        let time = Date.now() * 0.002;
        particles.forEach(p => {
            p.theta += 0.005;
            let radius = 100 + Math.sin(time + p.phi) * 5;
            let x = radius * Math.sin(p.phi) * Math.cos(p.theta) + 150;
            let y = radius * Math.sin(p.phi) * Math.sin(p.theta) + 150;
            ctx.fillStyle = ctx.shadowColor;
            ctx.beginPath(); ctx.arc(x,y,1,0,7); ctx.fill();
        });
        requestAnimationFrame(animate);
    }

    // --- LOGIKA EVOLUSI & PERASAAN ---

    }

    }

    animate();
    setInterval(checkSenses, 10000);
</script>
</body>
</html>
