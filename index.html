    <script>
        async function updateStatus() {
            try {
                // Menambahkan timestamp agar browser tidak menyimpan cache lama
                const response = await fetch('Judge_V25.csv?t=' + new Date().getTime());
                const data = await response.text();
                const lines = data.trim().split('\n');
                
                // Ambil baris paling bawah yang ada isinya
                const lastLine = lines[lines.length - 1];
                const col = lastLine.split(','); 

                // Penyesuaian Kolom (Asumsi: Jam, Balance, Equity, Mood)
                // Jika masih undefined, kita akan sesuaikan indeks [1], [2] nya
                document.getElementById('content').innerHTML = `
                    <div>BALANCE: <span class="stat">$${col[1] || '0'}</span></div>
                    <div>EQUITY: <span class="stat">$${col[2] || '0'}</span></div>
                    <div>MOOD: <span class="stat">${col[3] || 'Waiting...'}</span></div>
                    <div style="font-size:10px; color:#555;">Update: ${col[0] || '-'}</div>
                `;
                
                // Efek Warna Mode Sniper
                if(parseFloat(col[2]) < (parseFloat(col[1]) * 0.5)) {
                    document.getElementById('dashboard').className = 'box gold';
                } else {
                    document.getElementById('dashboard').className = 'box';
                }
            } catch (e) {
                console.log("Menunggu sinkronisasi DNA...");
            }
        }
        setInterval(updateStatus, 5000); 
        updateStatus();
    </script>
