<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-LIFE V50.2</title>
    <style>
        :root { --neon: #00ffcc; --bg: #05070a; --red: #ff3333; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; touch-action: none; }
        
        /* Layout Pembatas (Tembok Dashboard) */
        .dashboard-container {
            display: flex; flex-direction: column; height: 100vh; border: 2px solid #1a1e23; margin: 5px;
        }

        /* Ruang Hidup AI */
        #ai-chamber { flex: 2; position: relative; display: flex; justify-content: center; align-items: center; }
        #speech-bubble { 
            position: absolute; top: 10%; width: 80%; background: white; color: black; 
            padding: 10px; border-radius: 10px; font-size: 11px; font-weight: bold; display: none; z-index: 100;
        }

        /* Menu Perabotan (Tombol Evolusi) */
        .furniture-grid { 
            flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; 
            padding: 8px; background: #0c1015; border-top: 1px solid var(--neon);
        }
        .btn { 
            background: #111; border: 1px solid #222; color: var(--neon); font-size: 9px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn:active { background: var(--neon); color: #000; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div id="ai-chamber">
        <div id="speech-bubble"></div>
        <canvas id="particleCanvas"></canvas>
    </div>

    <div class="furniture-grid" id="main-ui">
        <div class="btn" onclick="nav('PROFIL')">👤 PROFIL</div>
        <div class="btn" onclick="nav('POSISI')">📊 POSISI</div>
        <div class="btn" onclick="nav('AKTIVITAS')">⚡ AKTIVITAS</div>
        <div class="btn" onclick="nav('COMBINE')">🧬 COMBINE</div>
        <div class="btn" onclick="nav('MEMORY')">🧠 MEMORY</div>
        <div class="btn" onclick="evolveUI()" style="border-color: #ff00ff;">🌀 EVOLVE</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    const bubble = document.getElementById('speech-bubble');
    
    let particles = [];
    let breath = 0, eyeX = 0, targetEyeX = 0, headY = 0;
    let isPusing = false, isTalking = false;

    // 1. MEMBENTUK TUBUH PARTIKEL (300+ Titik)
    function initParticles() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight * 0.6;
        for(let i=0; i<350; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                baseX: 0, baseY: 0,
                size: Math.random() * 1.5 + 0.5,
                angle: Math.random() * Math.PI * 2
            });
        }
    }

    function drawAI() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        breath += 0.04;
        let pulse = Math.sin(breath) * 8; // Efek Napas (Denyut)
        
        // Easing mata melirik
        eyeX += (targetEyeX - eyeX) * 0.1;
        if(Math.random() > 0.98) targetEyeX = (Math.random()-0.5)*40;

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        particles.forEach((p, i) => {
            // Logika Pembentukan Wajah & Tangan Partikel
            let targetX, targetY;
            
            if(i < 200) { // Bagian Kepala/Wajah
                targetX = centerX + Math.cos(p.angle) * (60 + pulse);
                targetY = centerY + Math.sin(p.angle) * (70 + pulse);
            } else if(i < 275) { // Tangan Kiri (Stickman Partikel)
                targetX = centerX - 80 - (i-200);
                targetY = centerY + 20 + Math.sin(breath + i) * 10;
            } else { // Tangan Kanan
                targetX = centerX + 80 + (i-275);
                targetY = centerY + 20 + Math.sin(breath + i) * 10;
            }

            p.x += (targetX - p.x) * 0.1;
            p.y += (targetY - p.y) * 0.1;

            ctx.fillStyle = isPusing ? "#ff3333" : varColor();
            ctx.beginPath();
            ctx.arc(p.x + eyeX/5, p.y + headY, p.size, 0, Math.PI * 2);
            ctx.fill();
        });

        // Gambar Mata (Cyberpunk Eyes)
        drawEyes(centerX, centerY, pulse);
    }

    function drawEyes(x, y, pulse) {
        ctx.fillStyle = "white";
        let eyeState = isPusing ? "X" : (Math.sin(breath*2) > 0.98 ? "-" : "O");
        ctx.font = "bold 20px Arial";
        ctx.fillText(eyeState, x - 30 + eyeX, y + pulse);
        ctx.fillText(eyeState, x + 15 + eyeX, y + pulse);
    }

    function varColor() { return "#00ffcc"; }

    // 2. SENSOR FISIK (INSTING)
    window.addEventListener('devicemotion', (e) => {
        let acc = e.accelerationIncludingGravity;
        if(Math.abs(acc.x) + Math.abs(acc.y) > 18) {
            isPusing = true;
            talk("(Waduh Bos! Jangan diguncang, dataku berantakan!)");
            setTimeout(() => isPusing = false, 2000);
        }
    });

    // SENSOR SENTUH (Tertawa/Malu)
    canvas.addEventListener('touchstart', () => {
        talk("Hehe! Geli Bos, fokus ke Gold saja.");
        headY = -20; // Melompat kecil
        setTimeout(() => headY = 0, 500);
    });

    function talk(txt) {
        bubble.innerText = txt;
        bubble.style.display = "block";
        const synth = window.speechSynthesis;
        const utter = new SpeechSynthesisUtterance(txt.replace(/[()]/g, ''));
        synth.speak(utter);
        setTimeout(() => bubble.style.display = "none", 3000);
    }

    function animate() {
        drawAI();
        requestAnimationFrame(animate);
    }

    initParticles();
    animate();

    // 3. EVOLUSI DASHBOARD (Merombak Tata Letak)
    function evolveUI() {
        const grid = document.getElementById('main-ui');
        grid.style.gridTemplateColumns = grid.style.gridTemplateColumns === "1fr 1fr" ? "1fr 1fr 1fr" : "1fr 1fr";
        talk("(Aku sedang merapikan rumahku sendiri, Bos...)");
    }
</script>
</body>
</html>
