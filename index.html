<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlord V100 Dashboard</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; }
        .card { border: 1px solid #00ff00; padding: 15px; margin-bottom: 10px; border-radius: 5px; box-shadow: 0 0 10px #00ff00; }
        .emotion { font-size: 2em; font-weight: bold; text-transform: uppercase; }
        .thought { font-style: italic; color: #00ccff; }
        .progress-bar { background: #333; height: 20px; width: 100%; border-radius: 10px; overflow: hidden; }
        .progress-fill { background: #ff0000; height: 100%; transition: width 0.5s; }
    </style>
</head>
<body>
    <h1>SYSTEM: OVERLORD V100</h1>
    <div class="card">
        <div>LEVEL EVOLUSI: <span id="level">1</span></div>
        <div class="emotion" id="emotion">CALM</div>
    </div>
    <div class="card">
        <div>PROFIT: $<span id="profit">0.00</span></div>
        <div>ACTIVE SEED: <span id="seed">SCANNING</span></div>
    </div>
    <div class="card">
        <div>STRESS LEVEL (AGGRESSION)</div>
        <div class="progress-bar"><div id="aggro-bar" class="progress-fill" style="width: 0%"></div></div>
    </div>
    <div class="card thought" id="thought">"(Inisialisasi memori...)"</div>

    <script>
        async function updateDashboard() {
            // URL raw GitHub Bos
            const url = 'https://raw.githubusercontent.com/elingfathurrodo-efr/AI_Overlord_Brain/main/Judge_V25.csv';
            try {
                const response = await fetch(url);
                const data = await response.text();
                const cols = data.split(',');

                document.getElementById('level').innerText = cols[0];
                document.getElementById('emotion').innerText = cols[1];
                document.getElementById('profit').innerText = cols[2];
                document.getElementById('thought').innerText = cols[3];
                document.getElementById('aggro-bar').style.width = cols[4] + '%';
                document.getElementById('seed').innerText = cols[5];
            } catch (e) { console.log("Menunggu sinkronisasi..."); }
        }
        setInterval(updateDashboard, 5000); // Update tiap 5 detik
    </script>
</body>
</html>
