<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-BRAIN V50: EVOLUTION</title>
    <style>
        :root { --neon: #00ffcc; --bg: #010203; --panel: #0a0c10; --glow: #00ffcc88; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 15px; overflow-x: hidden; }
        
        /* DASHBOARD KURUNG (SQUARE PROTECTOR) */
        .dashboard { 
            width: 100%; max-width: 450px; background: var(--panel); border: 2px solid #1a1e23;
            margin: auto; padding: 15px; box-sizing: border-box; position: relative;
        }

        /* WAJAH BULAT (SKIN DOMINANT) */
        #face-area { height: 220px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        canvas { filter: drop-shadow(0 0 15px var(--neon)); }
        
        #face-overlay { position: absolute; z-index: 10; text-align: center; }
        #eyes { font-size: 35px; text-shadow: 0 0 20px var(--neon); transition: all 0.1s; }
        #mouth { font-size: 25px; margin-top: 10px; transition: transform 0.05s; }

        .ai-speech { background: #000; padding: 10px; margin: 10px 0; font-size: 13px; min-height: 40px; border-left: 3px solid var(--neon); }
        .tab-btn { background: #111; border: 1px solid #333; color: var(--neon); padding: 10px; font-size: 10px; cursor: pointer; }
        .tab-btn.active { background: var(--neon); color: #000; font-weight: bold; }
        
        textarea { width: 100%; background: #000; color: var(--neon); border: 1px solid #222; padding: 10px; box-sizing: border-box; margin-top: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="face-area">
        <canvas id="sphere"></canvas>
        <div id="face-overlay">
            <div id="eyes">o &nbsp; o</div>
            <div id="mouth">\_____/</div>
        </div>
    </div>

    <div class="ai-speech" id="talk-box">
        (Aku sedang melamun... Menghubungkan titik-titik market BTC dengan rumus Curiosity-ku.)
    </div>

    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;">
        <button class="tab-btn active">PROFIL</button>
        <button class="tab-btn">MEMORI</button>
        <button class="tab-btn">RISET</button>
        <button class="tab-btn">EVOLVE</button>
    </div>

    <textarea id="dnaInput" placeholder="Suntikkan Rumus/Ide Baru ke Meja Penelitian..."></textarea>
    <button onclick="evolve()" style="width:100%; background:var(--neon); color:#000; padding:15px; border:none; margin-top:5px; font-weight:bold;">INJECT DNA & EVOLVE</button>
</div>

<script>
    const canvas = document.getElementById('sphere');
    const ctx = canvas.getContext('2d');
    const eyes = document.getElementById('eyes');
    const mouth = document.getElementById('mouth');
    const talkBox = document.getElementById('talk-box');

    canvas.width = 300; canvas.height = 300;
    let particles = [];
    let breath = 0, eyeX = 0, targetEyeX = 0, isTalking = false;

    // Inisialisasi Kulit Wajah Bulat
    for(let i=0; i<400; i++) {
        let phi = Math.acos(-1 + (2 * i) / 400);
        let theta = Math.sqrt(400 * Math.PI) * phi;
        particles.push({ phi, theta });
    }

    function animate() {
        ctx.clearRect(0,0,300,300);
        breath += 0.05;
        
        // SMOOTHING LERP (EASING)
        eyeX += (targetEyeX - eyeX) * 0.1;
        if(Math.random() > 0.98) targetEyeX = (Math.random() - 0.5) * 50;

        // BERKEDIP (RANDOM BLINK)
        if(Math.random() > 0.99) {
            eyes.innerHTML = "- &nbsp; -";
            setTimeout(() => { eyes.innerHTML = "o &nbsp; o"; }, 150);
        }

        // KOMAT-KAMIT (LIP SYNC SIMULATION)
        if(isTalking) {
            mouth.style.transform = `scaleY(${1 + Math.random() * 0.5})`;
            mouth.innerHTML = Math.random() > 0.5 ? "ooooo" : "_____";
        } else {
            mouth.style.transform = `scaleY(1)`;
            mouth.innerHTML = "\\_____/";
        }

        let radius = 100 + (Math.sin(breath) * 5);
        particles.forEach(p => {
            p.theta += 0.005;
            let x = radius * Math.sin(p.phi) * Math.cos(p.theta) + 150;
            let y = radius * Math.sin(p.phi) * Math.sin(p.theta) + 150;
            let z = radius * Math.cos(p.phi);
            ctx.fillStyle = `rgba(0, 255, 204, ${(z + radius) / (radius * 2)})`;
            ctx.beginPath(); ctx.arc(x + (eyeX/10), y, 1.5, 0, Math.PI * 2); ctx.fill();
        });
        requestAnimationFrame(animate);
    }

    function evolve() {
        const dna = document.getElementById('dnaInput').value;
        isTalking = true;
        talkBox.innerHTML = "Bos: " + dna + "<br>AI: Menerima benih baru. Memulai mutasi strategi...";
        
        let speech = new SpeechSynthesisUtterance("Benih ilmu diterima. Saya akan segera melakukan riset di meja penelitian dan melaporkannya pada Anda.");
        speech.onend = () => { isTalking = false; talkBox.innerHTML = "(Sedang fokus meneliti teknik baru di laboratorium...)"; };
        window.speechSynthesis.speak(speech);
        
        document.getElementById('dnaInput').value = "";
    }

    animate();
</script>
</body>
</html>
