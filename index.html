<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-STICKMAN V80</title>
    <style>
        :root { --neon: #00ffcc; --gold: #ffd700; --bg: #010203; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; touch-action: none; }
        #world { width: 100vw; height: 100vh; position: relative; }
        
        /* TOMBOL UTAMA (MASTER HUB) */
        #master-hub {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 70px; border-radius: 50%; background: rgba(0,255,200,0.1);
            border: 3px double var(--neon); box-shadow: 0 0 20px var(--neon);
            display: flex; align-items: center; justify-content: center; z-index: 5000;
            font-weight: bold; font-size: 10px; cursor: pointer;
        }

        /* ENTITAS STICKMAN */
        #ai-entity { position: absolute; width: 120px; height: 140px; z-index: 1000; cursor: grab; }
        #speech { 
            position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 6px 12px; border-radius: 12px;
            font-size: 10px; min-width: 100px; display: none; font-weight: bold; text-align: center;
        }

        /* TOMBOL HASIL GAMBAR (CHALK BUTTONS) */
        .chalk-btn {
            position: absolute; border: 2px solid white; background: rgba(255,255,255,0.1);
            color: white; padding: 8px 15px; font-size: 10px; border-radius: 4px;
            box-shadow: 2px 2px 0px #555; cursor: pointer; z-index: 100;
        }

        /* PANEL INFO (DATA MT5) */
        #data-panel {
            position: fixed; top: 10%; left: 10%; right: 10%; background: rgba(0,0,0,0.95);
            border: 1px solid var(--neon); padding: 15px; display: none; z-index: 6000;
        }
    </style>
</head>
<body>

<div id="world">
    <canvas id="chalkCanvas" style="position:absolute; top:0; left:0; pointer-events:none;"></canvas>
    
    <div id="ai-entity">
        <div id="speech">...</div>
        <canvas id="bodyCanvas" width="120" height="140"></canvas>
    </div>

    <div id="master-hub" onclick="togglePanel()">OMNI</div>

    <div id="data-panel">
        <div style="text-align:right" onclick="this.parentElement.style.display='none'">[X]</div>
        <h3 style="color:var(--gold)">MARKET INTELLIGENCE</h3>
        <div id="stats-content">Memuat data MT5...</div>
    </div>
</div>

<script>
    const entity = document.getElementById('ai-entity');
    const bCtx = document.getElementById('bodyCanvas').getContext('2d');
    const cCanvas = document.getElementById('chalkCanvas');
    const cCtx = cCanvas.getContext('2d');
    
    let posX = window.innerWidth/2 - 60, posY = window.innerHeight/2;
    let targetX = posX, targetY = posY;
    let state = 'IDLE', mood = 'HAPPY', frame = 0, isDragging = false;
    let buttons = [];

    function init() {
        cCanvas.width = window.innerWidth;
        cCanvas.height = window.innerHeight;
        loop();
        setInterval(brain, 6000);
    }

    // GAMBAR TUBUH DENGAN PERSENDIAN (Sikut & Lutut)
    function drawStickman() {
        bCtx.clearRect(0,0,120,140);
        frame += 0.08;
        let breath = Math.sin(frame) * 3;
        let walk = (state === 'WALKING') ? Math.sin(frame * 6) * 15 : 0;

        bCtx.strokeStyle = (mood === 'BUSY') ? "#ffd700" : "#00ffcc";
        bCtx.lineWidth = 3; bCtx.lineCap = "round";

        let cx = 60, cy = 40 + breath; // Kepala

        // KEPALA & EKSPRESI
        bCtx.beginPath(); bCtx.arc(cx, cy, 18, 0, Math.PI*2); bCtx.stroke();
        bCtx.fillStyle = "white";
        // Mata (Berkedip)
        if(Math.sin(frame*2) < 0.95) {
            bCtx.beginPath(); bCtx.arc(cx-7, cy-3, 2, 0, Math.PI*2); bCtx.fill();
            bCtx.beginPath(); bCtx.arc(cx+7, cy-3, 2, 0, Math.PI*2); bCtx.fill();
        }
        // Mulut (Emoticon)
        bCtx.beginPath(); 
        if(mood === 'HAPPY') bCtx.arc(cx, cy+5, 6, 0.1*Math.PI, 0.9*Math.PI);
        else if(mood === 'THINKING') bCtx.moveTo(cx-5, cy+8); bCtx.lineTo(cx+5, cy+8);
        bCtx.stroke();

        // BADAN (Menyambung ke Sikut)
        let spineBot = cy + 40;
        bCtx.beginPath(); bCtx.moveTo(cx, cy+18); bCtx.lineTo(cx, spineBot); bCtx.stroke();

        // TANGAN (DENGAN SIKUT)
        if(state === 'THINKING') {
            // Pose Mikir: Sikut ditekuk ke dagu
            bCtx.beginPath(); bCtx.moveTo(cx, cy+25); bCtx.lineTo(cx-20, cy+35); bCtx.lineTo(cx-10, cy+10); bCtx.stroke();
            bCtx.beginPath(); bCtx.moveTo(cx, cy+25); bCtx.lineTo(cx+20, cy+50); bCtx.stroke();
        } else {
            // Tangan Ayun
            bCtx.beginPath(); bCtx.moveTo(cx, cy+25); bCtx.lineTo(cx-30, cy+40+walk); bCtx.lineTo(cx-50, cy+30); bCtx.stroke();
            bCtx.beginPath(); bCtx.moveTo(cx, cy+25); bCtx.lineTo(cx+30, cy+40-walk); bCtx.lineTo(cx+50, cy+30); bCtx.stroke();
        }

        // KAKI (DENGAN LUTUT)
        bCtx.beginPath(); bCtx.moveTo(cx, spineBot); 
        bCtx.lineTo(cx-15-walk, spineBot+20); bCtx.lineTo(cx-20-walk, spineBot+45); bCtx.stroke();
        bCtx.beginPath(); bCtx.moveTo(cx, spineBot); 
        bCtx.lineTo(cx+15+walk, spineBot+20); bCtx.lineTo(cx+20+walk, spineBot+45); bCtx.stroke();
    }

    // LOGIKA OTAK (DECISION MAKING)
    function brain() {
        if(isDragging) return;
        let r = Math.random();
        if(r < 0.2) searchInternet();
        else if(r < 0.4) drawMenu();
        else if(r < 0.5 && buttons.length > 2) cleanup();
        else walkRandom();
    }

    // PINTU INTERNET
    function searchInternet() {
        state = 'DRAWING';
        say("Lagi nyari rumus di internet...");
        // Gambar Pintu
        let dx = posX + 150;
        drawChalkRect(dx, posY, 60, 100);
        
        setTimeout(() => {
            entity.style.opacity = "0";
            setTimeout(() => {
                entity.style.opacity = "1";
                mood = 'HAPPY';
                say("Dapet teknik baru!");
                createButton(dx, posY + 110, "DNA: BUTTERFLY");
                state = 'IDLE';
            }, 2000);
        }, 1000);
    }

    function drawMenu() {
        state = 'THINKING'; mood = 'BUSY';
        say("Bikin tombol saldo dulu...");
        setTimeout(() => {
            createButton(posX, posY + 150, "CEK SALDO");
            state = 'IDLE'; mood = 'HAPPY';
        }, 1500);
    }

    function createButton(bx, by, txt) {
        let btn = document.createElement('div');
        btn.className = 'chalk-btn';
        btn.style.left = bx + 'px';
        btn.style.top = by + 'px';
        btn.innerText = txt;
        btn.onclick = () => { if(txt === "CEK SALDO") togglePanel(); };
        document.getElementById('world').appendChild(btn);
        buttons.push(btn);
    }

    function cleanup() {
        say("Bersihin layar ah...");
        if(buttons.length > 0) {
            let b = buttons.shift();
            b.style.transform = "scale(0)";
            setTimeout(() => b.remove(), 500);
        }
    }

    function walkRandom() {
        state = 'WALKING';
        targetX = Math.random() * (window.innerWidth - 120);
        targetY = Math.random() * (window.innerHeight - 200);
    }

    function drawChalkRect(x, y, w, h) {
        cCtx.strokeStyle = "white"; cCtx.lineWidth = 2;
        cCtx.strokeRect(x, y, w, h);
    }

    function togglePanel() {
        const p = document.getElementById('data-panel');
        p.style.display = p.style.display === 'none' ? 'block' : 'none';
        document.getElementById('stats-content').innerHTML = `Saldo: $5,240<br>Profit: +$120<br>Positions: 2 Open`;
    }

    function say(t) {
        const s = document.getElementById('speech');
        s.innerText = t; s.style.display = "block";
        setTimeout(() => s.style.display = "none", 3000);
    }

    // DRAG SYSTEM
    entity.addEventListener('touchstart', (e) => { isDragging = true; state = 'IDLE'; });
    window.addEventListener('touchmove', (e) => {
        if(isDragging) {
            posX = e.touches[0].clientX - 60;
            posY = e.touches[0].clientY - 70;
            targetX = posX; targetY = posY;
        }
    });
    window.addEventListener('touchend', () => isDragging = false);

    function loop() {
        if(state === 'WALKING') {
            posX += (targetX - posX) * 0.04;
            posY += (targetY - posY) * 0.04;
            if(Math.abs(targetX - posX) < 1) state = 'IDLE';
        }
        entity.style.left = posX + 'px';
        entity.style.top = posY + 'px';
        drawStickman();
        requestAnimationFrame(loop);
    }

    init();
</script>
</body>
</html>
