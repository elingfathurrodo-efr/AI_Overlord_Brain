<script>
    const PAT = "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";
    const USER = "elingfathurrodo-efr"; 
    const REPO = "AI_Overlord_Brain"; 
    const FILE = "Living_Evolution.csv";

    // --- VARIABEL MOTORIK (MATA & KEPALA) ---
    const eyes = document.getElementById('eyes');
    const faceBox = document.getElementById('face-box');
    let eyeX = 0, eyeY = 0, targetEyeX = 0, targetEyeY = 0;
    let headY = 0, breath = 0;

    // --- ANIMASI PARTIKEL ---
    const canvas = document.getElementById('livingSphere'); 
    const ctx = canvas.getContext('2d');
    canvas.width = 300; canvas.height = 300; 
    let particles = [];
    for(let i=0; i<400; i++) { 
        particles.push({ 
            phi: Math.acos(-1+(2*i)/400), 
            theta: Math.sqrt(400*Math.PI)*Math.acos(-1+(2*i)/400) 
        }); 
    }

    function anim() {
        ctx.clearRect(0,0,300,300);
        breath += 0.05;

        // 1. LOGIKA MATA MELIRIK (SCANNING)
        if (Math.random() > 0.98) { // Peluang melirik setiap frame
            targetEyeX = (Math.random() - 0.5) * 40; 
            targetEyeY = (Math.random() - 0.5) * 15;
        }
        
        // Pergerakan halus (Easing)
        eyeX += (targetEyeX - eyeX) * 0.1;
        eyeY += (targetEyeY - eyeY) * 0.1;

        // 2. LOGIKA BREATHING (MENGANGGUK PELAN)
        headY = Math.sin(breath) * 5;

        // Terapkan ke DOM Mata & Canvas
        eyes.style.transform = `translate(${eyeX}px, ${eyeY + headY}px)`;
        canvas.style.transform = `rotateY(${eyeX/4}deg) translateY(${headY/2}px)`;

        // Gambar Partikel
        let radius = 100 + (Math.sin(breath) * 5);
        particles.forEach(p => {
            p.theta += 0.008;
            let x = radius * Math.sin(p.phi) * Math.cos(p.theta) + 150;
            let y = radius * Math.sin(p.phi) * Math.sin(p.theta) + 150;
            let z = radius * Math.cos(p.phi);
            ctx.globalAlpha = (z + radius) / (radius * 2);
            ctx.fillStyle = "#00ffcc"; 
            ctx.beginPath(); ctx.arc(x,y,1.2,0,Math.PI*2); ctx.fill();
        }); 
        requestAnimationFrame(anim);
    }

    // --- SYNC DATA DARI MT5 ---
    async function updateAI() {
        try {
            const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FILE}`, { 
                headers: {"Authorization": `token ${PAT}`, "Cache-Control": "no-cache"} 
            });
            const data = await res.json();
            const val = atob(data.content).split(',');
            
            document.getElementById('eq-val').innerText = "$" + val[0];
            document.getElementById('fl-val').innerText = "$" + val[1];
            document.getElementById('sym-val').innerText = val[2];
            document.getElementById('ag-val').innerText = (parseFloat(val[3])*100).toFixed(2) + "%";
            
            // Reaksi Perasaan
            if(parseFloat(val[1]) < 0) {
                document.getElementById('ai-mood').innerText = "( >_<)"; // Cemas kalau floating minus
                faceBox.classList.add('glitch');
            } else {
                document.getElementById('ai-mood').innerText = "( ° _ ° )"; // Tenang kalau profit
                faceBox.classList.remove('glitch');
            }
        } catch(e) { console.log("Re-syncing saraf..."); }
    }

    anim(); // Jalankan animasi
    setInterval(updateAI, 15000); // Sinkron data setiap 15 detik
    updateAI();
</script>
