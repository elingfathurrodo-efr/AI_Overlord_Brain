<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OVERLORD V28 - Holographic Brain</title>
    <style>
        :root { --neon: #00ffcc; --bg: #05070a; --panel: #0c1015; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 10px; overflow: hidden; }
        
        .header { text-align: center; padding: 10px; font-size: 10px; opacity: 0.5; border-bottom: 1px solid #1a1e23; }
        
        /* CONTAINER WAJAH HOLOGRAM */
        .face-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* LINGKARAN PARTIKEL (64 TITIK ANALOGY) */
        .hologram-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px dashed var(--neon);
            border-radius: 50%;
            animation: pulse 1.5s infinite ease-in-out, spin 10s linear infinite;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        /* MATA & MULUT */
        .face-features {
            position: absolute;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            text-shadow: 0 0 10px var(--neon);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .thought-bubble { 
            background: rgba(0,255,204,0.05); 
            border-left: 4px solid var(--neon); 
            padding: 15px; 
            margin: 10px; 
            font-size: 14px;
            border-radius: 0 10px 10px 0;
        }

        /* NAVIGASI & PANEL */
        .nav-bar { display: flex; gap: 5px; overflow-x: auto; padding: 10px 0; }
        .nav-btn { background: var(--panel); border: 1px solid #1a1e23; color: var(--neon); padding: 8px 12px; border-radius: 5px; font-size: 11px; }
        .nav-btn.active { background: var(--neon); color: #000; }
        
        .page { display: none; padding: 10px; background: var(--panel); border-radius: 10px; border: 1px solid #1a1e23; }
        .page.active { display: block; }
    </style>
</head>
<body>

<div class="header">SYSTEM INTERFACE V28.4 - ACTIVE</div>

<div class="face-container">
    <div class="hologram-circle" id="circle"></div>
    <div class="face-features">
        <div id="eyes">o &nbsp; o</div>
        <div id="mouth" style="margin-top: 10px; font-size: 14px;">\___/</div>
    </div>
</div>

<div class="thought-bubble" id="thought">"Initializing holographic matrix..."</div>

<div class="nav-bar">
    <button class="nav-btn active" onclick="tab('p1', this)">PROFIL</button>
    <button class="nav-btn" onclick="tab('p2', this)">POSISI</button>
    <button class="nav-btn" onclick="tab('p3', this)">AKTIVITAS</button>
    <button class="nav-btn" onclick="tab('p4', this)">MEMORI</button>
    <button class="nav-btn" onclick="tab('p5', this)">INTERAKSI</button>
</div>

<div id="p1" class="page active">
    <small>EQUITY</small> <b id="profit">$0.00</b><br>
    <small>MOOD</small> <b id="mood">ZEN</b>
</div>
<div id="p5" class="page">
    <textarea id="inp" style="width:100%; background:#000; color:var(--neon); border:1px solid #333;" rows="3"></textarea>
    <button style="width:100%; padding:10px; margin-top:5px; background:var(--neon); border:none;" onclick="alert('Sent!')">AJARKAN</button>
</div>

<script>
    const CSV_URL = 'https://raw.githubusercontent.com/elingfathurrodo-efr/AI_Overlord_Brain/main/Living_Evolution.csv';
    let lastT = "";

    function tab(id, b) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        b.classList.add('active');
    }

    async function update() {
        try {
            const r = await fetch(CSV_URL + '?t=' + new Date().getTime());
            const text = await r.text();
            const d = text.split(',');

            if(d.length > 1) {
                document.getElementById('thought').innerText = `"${d[0]}"`;
                document.getElementById('profit').innerText = "$" + d[1];
                
                // Animasi Kedip (Logika Bos)
                let blink = Math.random() > 0.9;
                document.getElementById('eyes').innerHTML = blink ? "- &nbsp; -" : "o &nbsp; o";

                // Suara
                if(d[0] !== lastT && !d[0].includes("(")) {
                    let s = new SpeechSynthesisUtterance(d[0]);
                    s.lang = 'id-ID';
                    window.speechSynthesis.speak(s);
                    lastT = d[0];
                }
            }
        } catch(e) {}
    }

    setInterval(update, 3000);
</script>
</body>
</html>
